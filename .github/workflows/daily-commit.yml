name: Daily Automated Commit

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.email "23f2003592@ds.study.iitm.ac.in"
          git config user.name "DevSync Automation"

      - name: Commit update by 23f2003592@ds.study.iitm.ac.in
        run: |
          echo "Daily sync: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> activity-log.txt
          git add activity-log.txt
          git commit -m "chore: daily automated commit - $(date '+%Y-%m-%d')"
          git push
